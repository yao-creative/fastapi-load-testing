services:
  api:
    build:
      context: .
    cpus: "1.0"
    mem_limit: "512m"
    ports:
      - "8000:8000"
    # `--reload` is incompatible with `--workers`; use two worker processes as in the Dockerfile.
    command: &api_command
      [
        "uv",
        "run",
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--workers",
        "2",
      ]
    develop:
      watch:
        - action: sync+restart
          path: ./app
          target: /app/app
        - action: rebuild
          path: ./pyproject.toml
        - action: rebuild
          path: ./uv.lock
        - action: rebuild
          path: ./Dockerfile

  locust:
    build:
      context: ./loadtest
    cpus: "1.0"
    mem_limit: "512m"
    depends_on:
      - api
    ports:
      - "8089:8089"
    environment:
      # Locust reads LOCUST_HOST as its default target host.
      - LOCUST_HOST=http://api:8000
    command: >
      locust
      -f /mnt/locust/locustfile.py
      --web-host 0.0.0.0
      --web-port 8089
    volumes:
      - ./loadtest:/mnt/locust:ro
