services:
  api:
    build:
      context: .
    cpus: "1.0"
    mem_limit: "512m"
    ports:
      - "8000:8000"
    # `--reload` is incompatible with `--workers`; use two worker processes as in the Dockerfile.
    command: &api_command
      [
        "uv",
        "run",
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--workers",
        "2",
      ]
    develop:
      watch:
        - action: sync+restart
          path: ./app
          target: /app/app
        - action: rebuild
          path: ./pyproject.toml
        - action: rebuild
          path: ./uv.lock
        - action: rebuild
          path: ./Dockerfile

  locust:
    build:
      context: ./loadtest
    cpus: "1.0"
    mem_limit: "512m"
    depends_on:
      - api
    ports:
      - "8089:8089"
    environment:
      # Locust reads LOCUST_HOST as its default target host.
      - LOCUST_HOST=http://api:8000
    command: >
      locust
      -f /mnt/locust/locustfile.py
      --web-host 0.0.0.0
      --web-port 8089
    volumes:
      - ./loadtest:/mnt/locust:ro

  # TODO(celery-redis setup):
  # Add a `redis` service here when you are ready to implement the real broker/backend.
  #
  # Suggested next services after `redis`:
  # - `celery-worker`: consumes queued tasks
  # - `celery-beat`: publishes scheduled tasks
  #
  # Suggested ownership:
  # - `api`: submits tasks and exposes status endpoints
  # - `redis`: broker + result backend
  # - `celery-worker`: executes task bodies
  # - `celery-beat`: schedules recurring task publication
  #
  # Keep these commented until you reach the implementation exercises so the
  # repo stays documentation-first.
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  worker:
    build: .
    command: celery -A app.core.celery_app worker -l info
    depends_on:
      - redis
    develop:
      watch:
        - action: sync+restart
          path: ./app
          target: /app/app
        - action: rebuild
          path: ./pyproject.toml
        - action: rebuild
          path: ./uv.lock
        - action: rebuild
          path: ./Dockerfile
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - DEFAULT_CELERY_QUEUE=jobs
      - HEAVY_CELERY_QUEUE=pipelines
      - PERIODIC_CELERY_QUEUE=periodic

  beat:
    build: .
    command: celery -A app.core.celery_app beat -l info
    depends_on:
      - redis
    develop:
      watch:
        - action: sync+restart
          path: ./app
          target: /app/app
        - action: rebuild
          path: ./pyproject.toml
        - action: rebuild
          path: ./uv.lock
        - action: rebuild
          path: ./Dockerfile
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - DEFAULT_CELERY_QUEUE=jobs
      - HEAVY_CELERY_QUEUE=pipelines
      - PERIODIC_CELERY_QUEUE=periodic
